name: E2E Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Run weekly on Monday at 06:00 UTC
    - cron: "0 6 * * 1"

jobs:
  e2e:
    name: "E2E Tests (${{ matrix.provider }})"
    runs-on: ubuntu-latest
    environment: e2e
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        provider: [digital-ocean, vultr, gcp]
    steps:
      - name: "Clone project repository"
        uses: actions/checkout@v6
      - name: "Install uv"
        uses: astral-sh/setup-uv@v7
      - name: "Install Python"
        run: uv python install 3.13
      - name: "Install dependencies"
        run: uv sync
      - name: "Authenticate to GCP via Workload Identity Federation"
        if: matrix.provider == 'gcp'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.E2E_GCP_WIF_PROVIDER }}
          service_account: ${{ vars.E2E_GCP_SERVICE_ACCOUNT }}
      - name: "Run E2E tests"
        env:
          E2E_PROVIDER: ${{ matrix.provider }}
          E2E_SSH_KEY: ${{ vars.E2E_SSH_KEY }}
          # DigitalOcean credentials
          E2E_DO_TOKEN: ${{ secrets.E2E_DO_TOKEN }}
          E2E_DO_DNS_ZONE: ${{ vars.E2E_DO_DNS_ZONE }}
          E2E_PROJECT: ${{ vars.E2E_PROJECT }}
          # Vultr credentials
          E2E_VULTR_API_KEY: ${{ secrets.E2E_VULTR_API_KEY }}
          E2E_VULTR_DNS_ZONE: ${{ vars.E2E_VULTR_DNS_ZONE }}
          # GCP credentials. The auth step above sets GOOGLE_APPLICATION_CREDENTIALS
          # to a short-lived credential file; the provider picks it up via ADC
          # (google.auth.default()) when E2E_GCP_CREDENTIALS_FILE is unset.
          E2E_GCP_PROJECT_ID: ${{ vars.E2E_GCP_PROJECT_ID }}
          E2E_GCP_DNS_ZONE: ${{ vars.E2E_GCP_DNS_ZONE }}
        run: uv run pytest tests/test_e2e.py -v -m e2e
